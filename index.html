<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iraq Compass | Discover Businesses & Events in Iraq</title>
    <meta name="description" content="The definitive directory for businesses, restaurants, hotels, and events across Iraq. AI-curated and multi-language support." />
    <meta name="theme-color" content="#D4A853" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Iraq Compass" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=IBM+Plex+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
      :root {
        --bg-deep: #07090F;
        --bg-card: #0F1629;
        --bg-elevated: #162040;
        --gold: #D4A853;
        --gold-bright: #F5D18A;
        --teal: #2A9D8F;
        --text-white: #F0EDE8;
        --text-muted: #8A9BB5;
        --text-faint: #4A5568;
        --border-custom: #1E2D52;
      }

      * {
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      *::-webkit-scrollbar {
        display: none;
      }

      body {
        font-family: 'Sora', sans-serif;
        background-color: var(--bg-deep);
        color: var(--text-white);
        margin: 0;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      [dir="rtl"] {
        font-family: 'IBM Plex Sans Arabic', sans-serif;
      }

      .cc-card {
        background-color: var(--bg-card);
        border: 1px solid var(--border-custom);
        border-radius: 20px;
        transition: all 0.3s ease;
      }
      .cc-card:hover {
        border-color: rgba(212, 168, 83, 0.4);
        transform: translateY(-2px);
      }

      .btn-gold {
        background: linear-gradient(135deg, var(--gold), var(--gold-bright));
        color: var(--bg-deep);
        font-weight: 700;
        padding: 12px 24px;
        border-radius: 12px;
        border: none;
        cursor: pointer;
        transition: opacity 0.2s ease;
      }
      .btn-gold:hover {
        opacity: 0.9;
      }
      .btn-gold:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .btn-ghost {
        background: transparent;
        color: var(--text-white);
        font-weight: 700;
        padding: 12px 24px;
        border-radius: 12px;
        border: 1px solid var(--border-custom);
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .btn-ghost:hover {
        background: rgba(255, 255, 255, 0.05);
        border-color: var(--gold);
      }

      .badge-gold {
        background: rgba(212, 168, 83, 0.1);
        border: 1px solid rgba(212, 168, 83, 0.2);
        color: var(--gold);
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .badge-teal {
        background: rgba(42, 157, 143, 0.1);
        border: 1px solid rgba(42, 157, 143, 0.2);
        color: var(--teal);
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .badge-green {
        background: rgba(34, 197, 94, 0.1);
        border: 1px solid rgba(34, 197, 94, 0.2);
        color: #22c55e;
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .cc-input {
        background-color: var(--bg-card);
        border: 1px solid var(--border-custom);
        border-radius: 12px;
        color: var(--text-white);
        padding: 12px 16px;
        outline: none;
        transition: border-color 0.2s ease;
      }
      .cc-input:focus {
        border-color: var(--gold);
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      .animate-pulse-custom {
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
